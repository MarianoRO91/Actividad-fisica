<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Actividad">
<meta name="theme-color" content="#e9e4d6">
<meta name="color-scheme" content="light">
<title>Actividad Física Semanal</title>
<style>
  :root{
    color-scheme:light;
    --ink:#12211c;
    --paper:#e9e4d6;
    --paper-2:#ddd6c4;
    --line:#12211c;
    --sweat:#1f6f5c;      /* verde esfuerzo */
    --sweat-2:#2b9d80;
    --burn:#c4491f;       /* naranja quemado */
    --gold:#c79a2b;
    --dim:#5c5749;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-l:env(safe-area-inset-left,0px);
    --safe-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html{-webkit-text-size-adjust:100%}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.4;
    padding:
      calc(18px + var(--safe-t))
      calc(16px + var(--safe-r))
      calc(40px + var(--safe-b))
      calc(16px + var(--safe-l));
    max-width:760px;margin:0 auto;
    overscroll-behavior-y:none;
  }
  .mono{font-family:"SFMono-Regular",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}

  /* ---- Cabecera / dial global ---- */
  header{margin-bottom:22px}
  .eyebrow{
    font:600 11px/1 ui-monospace,monospace;
    letter-spacing:.28em;text-transform:uppercase;color:var(--dim);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  h1{
    font-size:clamp(30px,8vw,46px);
    font-weight:800;letter-spacing:-.02em;margin:.15em 0 .1em;
    line-height:.98;
  }
  .week{font:500 13px/1 ui-monospace,monospace;color:var(--dim);letter-spacing:.02em}

  .dial{
    margin-top:18px;border:2px solid var(--line);
    background:var(--paper-2);min-height:64px;
    position:relative;overflow:hidden;
  }
  .dial-fill{
    position:absolute;inset:0;transform-origin:left;
    background:
      repeating-linear-gradient(45deg,var(--sweat) 0 14px,var(--sweat-2) 14px 28px);
    transition:transform .55s cubic-bezier(.2,.8,.2,1);
  }
  .dial-txt{
    position:relative;display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;gap:10px;
  }
  .dial-pct{font:800 30px/1 ui-monospace,monospace;letter-spacing:-.02em;
    color:var(--ink);z-index:2;
    background:var(--paper);padding:3px 9px;border:2px solid var(--line);}
  .dial-count{font:500 12px/1.35 ui-monospace,monospace;text-align:right;z-index:2;color:var(--ink);
    background:var(--paper);padding:5px 9px;border:2px solid var(--line);}

  /* ---- Bloques ---- */
  section{margin-top:26px;border-top:2px solid var(--line);padding-top:14px}
  .sec-head{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:2px}
  .sec-title{font-weight:800;font-size:20px;letter-spacing:-.01em}
  .sec-meta{font:600 11px/1 ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);white-space:nowrap}

  /* mini barra por bloque */
  .bar{height:8px;border:1.5px solid var(--line);margin:8px 0 12px;background:var(--paper-2)}
  .bar > i{display:block;height:100%;background:var(--sweat);transition:width .45s cubic-bezier(.2,.8,.2,1)}
  .bar.burn > i{background:var(--burn)}

  ul{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:2px 14px}
  @media(max-width:560px){ul{grid-template-columns:1fr;gap:0}}
  li{margin:0}
  .item{
    display:flex;align-items:center;gap:13px;
    padding:9px 4px;min-height:48px;user-select:none;
    border-bottom:1px solid rgba(18,33,28,.12);
  }
  .sets{display:flex;gap:6px;flex:0 0 auto}
  .set{
    width:28px;height:28px;border:2px solid var(--line);
    display:grid;place-items:center;position:relative;background:transparent;
    cursor:pointer;transition:background .15s,transform .08s;
    touch-action:manipulation;
  }
  .set:active{transform:scale(.9)}
  .set svg{width:18px;height:18px;stroke:var(--paper);stroke-width:3.2;fill:none;
    stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:22;stroke-dashoffset:22;transition:stroke-dashoffset .22s ease}
  .set.on{background:var(--sweat)}
  .set.on svg{stroke-dashoffset:0}
  .label{font-size:16px;transition:color .2s}
  .item.done .label{color:var(--dim);text-decoration:line-through;text-decoration-thickness:1.5px}

  /* contador (nadar / caminar) */
  .counter{display:flex;align-items:center;gap:14px;padding:10px 0 4px;flex-wrap:wrap}
  .step{
    width:52px;height:52px;border:2px solid var(--line);background:var(--paper-2);
    font:700 26px/1 ui-monospace,monospace;cursor:pointer;color:var(--ink);
    display:grid;place-items:center;transition:transform .08s,background .15s;
    touch-action:manipulation;
  }
  .step:active{transform:scale(.92);background:var(--paper)}
  .cval{font:800 30px/1 ui-monospace,monospace;min-width:2.4ch;text-align:center}
  .cgoal{font:500 13px/1.3 ui-monospace,monospace;color:var(--dim);flex:1 1 130px}

  /* caminar: 7 días */
  .days{display:flex;gap:6px;margin-top:8px}
  .day{
    flex:1;min-width:0;border:2px solid var(--line);background:var(--paper-2);
    text-align:center;padding:11px 2px 9px;cursor:pointer;position:relative;
    transition:background .15s,transform .08s;touch-action:manipulation;
  }
  .day:active{transform:scale(.94)}
  .day .dn{font:600 10px/1 ui-monospace,monospace;letter-spacing:.06em;color:var(--dim);text-transform:uppercase}
  .day .dk{font:700 11px/1 ui-monospace,monospace;margin-top:5px;color:var(--ink)}
  .day.hit{background:var(--burn);border-color:var(--burn)}
  .day.hit .dn,.day.hit .dk{color:var(--paper)}

  footer{margin-top:34px;border-top:2px solid var(--line);padding-top:16px;
    display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .reset{background:none;border:1.5px solid var(--line);color:var(--ink);
    font:600 11px/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;
    padding:14px 18px;cursor:pointer;min-height:44px;touch-action:manipulation}
  .reset:active{background:var(--burn);color:var(--paper);border-color:var(--burn)}
  .saved{font:500 11px/1 ui-monospace,monospace;color:var(--dim)}
  .streak{font:600 11px/1 ui-monospace,monospace;color:var(--dim)}

  :focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="eyebrow"><span>Registro semanal</span><span id="streakTop">·</span></div>
  <h1>ACTIVIDAD<br>FÍSICA</h1>
  <div class="week" id="weekLabel"></div>

  <div class="dial">
    <div class="dial-fill" id="dialFill" style="transform:scaleX(0)"></div>
    <div class="dial-txt">
      <span class="dial-pct" id="dialPct">0%</span>
      <span class="dial-count" id="dialCount">0 / 0<br>tareas</span>
    </div>
  </div>
</header>

<main id="app"></main>

<footer>
  <button class="reset" id="resetBtn">Reiniciar semana</button>
  <span class="saved" id="savedNote">Guardado local · offline</span>
</footer>

<script>
"use strict";

/* ---------- Modelo de datos ---------- */
const SETS = 3;
const CHECK = (items)=>items.map(t=>({t,sets:[false,false,false]}));

const MODEL = {
  musculacion:{
    title:"Musculación", meta:"Gimnasio · 3 series", type:"check", color:"sweat",
    items:CHECK(["Dominadas","Remo","Peso muerto","Sentadillas","Press banca",
      "Aperturas","Fondos","Press militar","Elevaciones laterales","Dragon flag",
      "Bíceps/tríceps","Abd/add piernas"])
  },
  calistenia:{
    title:"Calistenia en casa", meta:"Casa · 3 series", type:"check", color:"sweat",
    items:CHECK(["Flexiones arqueras","Glúteos-lumbares","Bíceps","Sentadillas una pierna",
      "Plancha una pierna","Fondos silla","Nordic curl","Hefesto curl",
      "Flexiones una mano","Hollow body rocks","Paracaídas","Flexiones pica"])
  },
  nadar:{
    title:"Nadar", meta:"Objetivo 50 largos", type:"count", color:"sweat",
    goal:50, step:5, value:0, unit:"largos"
  },
  caminar:{
    title:"Caminar", meta:"≥300 kcal · 5 de 7 días", type:"days", color:"burn",
    goalDays:5, days:[false,false,false,false,false,false,false]
  }
};
const DAYNAMES=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

/* ---------- Persistencia + semana ISO ---------- */
function isoWeek(d){
  const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=t.getUTCDay()||7; t.setUTCDate(t.getUTCDate()+4-day);
  const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const wn=Math.ceil((((t-ys)/86400000)+1)/7);
  return {year:t.getUTCFullYear(),week:wn};
}
const KEY="af_semanal_v2";
let state, streak=0;

function load(){
  const now=new Date(); const {year,week}=isoWeek(now);
  const tag=year+"-W"+String(week).padStart(2,"0");
  let raw=null;
  try{ raw=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  if(raw && raw.tag===tag){
    state=raw.data; streak=raw.streak||0;
  }else{
    // ¿semana completada la anterior? mantener racha
    streak = (raw && raw.lastComplete) ? (raw.streak||0) : (raw?raw.streak||0:0);
    state=structuredClone(MODEL);
    save(tag);
  }
  state.__tag=tag;
}
function save(tagOverride){
  const tag=tagOverride||state.__tag;
  const clean=structuredClone(state); delete clean.__tag;
  const payload={tag,data:clean,streak,lastComplete:overallPct()>=100};
  try{ localStorage.setItem(KEY,JSON.stringify(payload)); }
  catch(e){ document.getElementById("savedNote").textContent="No se pudo guardar (almacenamiento bloqueado)"; }
}

/* ---------- Cálculo de progreso ---------- */
function blockPct(k){
  const b=state[k];
  if(b.type==="check"){
    let doneSets=0; const totalSets=b.items.length*SETS;
    let fullEx=0;
    for(const it of b.items){
      const s=it.sets.filter(Boolean).length;
      doneSets+=s; if(s===SETS)fullEx++;
    }
    return {pct:doneSets/totalSets*100, done:doneSets, total:totalSets, fullEx, exTotal:b.items.length};
  }
  if(b.type==="count"){return {pct:Math.min(100,b.value/b.goal*100),done:b.value,total:b.goal};}
  if(b.type==="days"){const d=b.days.filter(Boolean).length;return {pct:Math.min(100,d/b.goalDays*100),done:d,total:b.goalDays};}
}
function overallPct(){
  const ks=["musculacion","calistenia","nadar","caminar"];
  return ks.reduce((s,k)=>s+blockPct(k).pct,0)/ks.length;
}

/* ---------- Render ---------- */
const app=document.getElementById("app");
function render(){
  app.innerHTML="";
  for(const k of ["musculacion","calistenia","nadar","caminar"]){
    const b=state[k], p=blockPct(k);
    const sec=document.createElement("section");
    const burn = b.color==="burn"?" burn":"";
    sec.innerHTML=`
      <div class="sec-head">
        <span class="sec-title">${b.title}</span>
        <span class="sec-meta">${b.meta}</span>
      </div>
      <div class="bar${burn}"><i style="width:${p.pct}%"></i></div>`;

    if(b.type==="check"){
      const ul=document.createElement("ul");
      b.items.forEach((it,i)=>{
        const full=it.sets.every(Boolean);
        const boxes=it.sets.map((on,si)=>
          `<span class="set${on?' on':''}" data-k="${k}" data-i="${i}" data-s="${si}" role="checkbox" tabindex="0" aria-checked="${on}" aria-label="${it.t} serie ${si+1}">
             <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg></span>`
        ).join("");
        const li=document.createElement("li");
        li.innerHTML=`<div class="item${full?' done':''}">
          <span class="sets">${boxes}</span>
          <span class="label">${it.t}</span></div>`;
        ul.appendChild(li);
      });
      sec.appendChild(ul);
    }
    else if(b.type==="count"){
      const c=document.createElement("div");c.className="counter";
      c.innerHTML=`
        <button class="step" data-count="${k}" data-d="-1" aria-label="Restar">−</button>
        <span class="cval">${b.value}</span>
        <button class="step" data-count="${k}" data-d="1" aria-label="Sumar">+</button>
        <span class="cgoal">de ${b.goal} ${b.unit} (+${b.step}/toque prolongado)</span>`;
      sec.appendChild(c);
    }
    else if(b.type==="days"){
      const wrap=document.createElement("div");wrap.className="days";
      b.days.forEach((on,i)=>{
        const d=document.createElement("div");
        d.className="day"+(on?" hit":"");d.dataset.day=k;d.dataset.di=i;
        d.setAttribute("role","checkbox");d.setAttribute("tabindex","0");d.setAttribute("aria-checked",on);
        d.innerHTML=`<div class="dn">${DAYNAMES[i]}</div><div class="dk">${on?'300+':'—'}</div>`;
        wrap.appendChild(d);
      });
      sec.appendChild(wrap);
    }
    app.appendChild(sec);
  }
  renderDial();
}

let prevComplete=false;
function renderDial(){
  const o=overallPct();
  document.getElementById("dialFill").style.transform=`scaleX(${o/100})`;
  document.getElementById("dialPct").textContent=Math.round(o)+"%";

  let doneU=0,totU=0;
  for(const k of ["musculacion","calistenia"]){const p=blockPct(k);doneU+=p.done;totU+=p.total;}
  document.getElementById("dialCount").innerHTML=
    `${Math.round(o)===100?'✔ semana completa':doneU+' / '+totU+' series'}<br>` +
    `nadar ${state.nadar.value}/${state.nadar.goal} · caminar ${state.caminar.days.filter(Boolean).length}/${state.caminar.goalDays}`;

  const label=isoWeek(new Date());
  document.getElementById("weekLabel").textContent=`Semana ${label.week} · ${label.year}`;
  document.getElementById("streakTop").textContent = streak>0 ? `Racha ${streak} sem` : "Sin racha";

  if(o>=100 && !prevComplete){
    if(!state.__countedComplete){streak++;state.__countedComplete=true;}
    burst();
  }
  if(o<100)state.__countedComplete=false;
  prevComplete=o>=100;
}

/* ---------- Interacción ---------- */
function toggleSet(k,i,s){const st=state[k].items[i].sets;st[s]=!st[s];commit();}
function bumpCount(k,delta){const b=state[k];b.value=Math.max(0,Math.min(b.goal, b.value+delta));commit();}
function toggleDay(k,i){state[k].days[i]=!state[k].days[i];commit();}
function commit(){save();render();}

app.addEventListener("click",e=>{
  const set=e.target.closest(".set");
  if(set){toggleSet(set.dataset.k,+set.dataset.i,+set.dataset.s);return;}
});
// contador: un toque = 1 largo; mantener pulsado = paso de 5
app.addEventListener("pointerdown",e=>{
  const step=e.target.closest("[data-count]");
  if(!step)return;
  const k=step.dataset.count, d=+step.dataset.d;
  const x0=e.clientX,y0=e.clientY;
  let long=false,cancelled=false;
  const timer=setTimeout(()=>{if(!cancelled){long=true;bumpCount(k,d*state[k].step);}},450);
  const move=ev=>{ if(Math.hypot(ev.clientX-x0,ev.clientY-y0)>12){cancelled=true;clearTimeout(timer);cleanup();} };
  const up=()=>{clearTimeout(timer);if(!long&&!cancelled)bumpCount(k,d);cleanup();};
  const cancel=()=>{cancelled=true;clearTimeout(timer);cleanup();};
  function cleanup(){
    step.removeEventListener("pointerup",up);
    step.removeEventListener("pointerleave",up);
    step.removeEventListener("pointermove",move);
    step.removeEventListener("pointercancel",cancel);
  }
  step.addEventListener("pointerup",up);
  step.addEventListener("pointerleave",up);
  step.addEventListener("pointermove",move);
  step.addEventListener("pointercancel",cancel);
},{passive:true});

app.addEventListener("click",e=>{
  const day=e.target.closest(".day");
  if(day)toggleDay(day.dataset.day,+day.dataset.di);
});
app.addEventListener("keydown",e=>{
  if(e.key!=="Enter"&&e.key!==" ")return;
  const set=e.target.closest(".set");
  if(set){e.preventDefault();toggleSet(set.dataset.k,+set.dataset.i,+set.dataset.s);return;}
  const day=e.target.closest(".day");
  if(day){e.preventDefault();toggleDay(day.dataset.day,+day.dataset.di);}
});

document.getElementById("resetBtn").addEventListener("click",()=>{
  if(!confirm("¿Reiniciar todos los objetivos de esta semana? La racha se conserva."))return;
  const s=streak; state=structuredClone(MODEL); streak=s; state.__tag=isoWeek(new Date()).year+"-W"+String(isoWeek(new Date()).week).padStart(2,"0");
  prevComplete=false;commit();
});

/* ---------- Micro-celebración ---------- */
function burst(){
  const N=26, cols=["#1f6f5c","#c4491f","#c79a2b","#2b9d80"];
  for(let i=0;i<N;i++){
    const p=document.createElement("div");
    p.style.cssText=`position:fixed;top:14%;left:50%;width:8px;height:14px;z-index:99;
      background:${cols[i%4]};pointer-events:none;`;
    document.body.appendChild(p);
    const ang=(Math.random()*2-1)*1.4, dist=120+Math.random()*160, rot=Math.random()*720;
    p.animate([
      {transform:`translate(-50%,0) rotate(0)`,opacity:1},
      {transform:`translate(calc(-50% + ${Math.sin(ang)*dist}px), ${Math.cos(ang)*dist+120}px) rotate(${rot}deg)`,opacity:0}
    ],{duration:900+Math.random()*500,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=()=>p.remove();
  }
}

/* ---------- Init ---------- */
load();render();
</script>
</body>
</html>
